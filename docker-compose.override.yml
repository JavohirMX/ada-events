# Development overrides — automatically merged with docker-compose.yml by
# `docker-compose up`. Never used in production (not present on the server).
#
# What this gives you:
#   - Template / Python changes are live without rebuilding the image
#   - gunicorn --reload restarts workers on Python file changes
#   - Tailwind watcher compiles CSS on every save

services:
  web:
    # Mount the entire project so template/static/Python changes are reflected
    # immediately — no image rebuild needed.
    volumes:
      - .:/app
      - static_volume:/app/staticfiles   # share collectstatic output with nginx
    environment:
      - DEBUG=True
    command:
      - gunicorn
      - --bind=0.0.0.0:8000
      - --workers=2
      - --reload              # restart workers when Python files change
      - --reload-extra-file=templates
      - --timeout=120
      - --log-level=debug
      - --access-logfile=-
      - ada_events.wsgi:application

  # Tailwind CSS watcher — compiles output.css on every template/CSS save.
  # The compiled file is written into the host's static/css/output.css which is
  # bind-mounted into the `web` container via the volume above.
  tailwind:
    image: node:20-alpine
    working_dir: /app
    # Install deps inside the container (isolated from the host) then watch.
    command: sh -c "npm install && npm run watch"
    volumes:
      - .:/app
      - tailwind_node_modules:/app/node_modules   # persist deps between restarts
    restart: unless-stopped

volumes:
  static_volume:
  tailwind_node_modules:
