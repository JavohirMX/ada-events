{% if page_obj.has_next and next_page_url %}
<div
    id="event-list-load-more"
    data-events-load-more="true"
    class="col-span-full flex flex-col items-center justify-center gap-3 py-2"
    hx-get="{{ next_page_url }}"
    hx-trigger="revealed"
    hx-swap="outerHTML"
>
    <div class="h-10 w-10 animate-spin rounded-full border-2 border-gray-200 border-t-black dark:border-zinc-700 dark:border-t-white" aria-hidden="true"></div>
    <a
        href="{{ next_page_url }}"
        class="inline-flex items-center justify-center rounded-full border border-gray-200/80 dark:border-zinc-700 bg-white dark:bg-zinc-900 px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-200 hover:text-gray-900 dark:hover:text-white transition-colors"
    >
        Load more
    </a>
</div>
{% endif %}
