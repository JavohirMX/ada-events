{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Change Password - ADA Bali Events{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-6 lg:px-8 py-16 lg:py-24">
    <div class="bg-white/80 dark:bg-zinc-900/80 backdrop-blur-xl border border-gray-200 dark:border-white/10 rounded-[32px] p-8 md:p-10 shadow-[0_8px_30px_rgb(0,0,0,0.12)] dark:shadow-[0_8px_30px_rgb(0,0,0,0.3)]">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold tracking-tight text-gray-900 dark:text-white mb-2">Change Password</h1>
            <p class="text-gray-600 dark:text-gray-300">Update your account password.</p>
        </div>
        
        <form class="space-y-6 auth-form" method="POST" action="{% url 'account_change_password' %}">
            {% csrf_token %}
            {{ form|crispy }}
            
            <button type="submit" class="w-full bg-black dark:bg-white text-white dark:text-black hover:scale-[1.02] active:scale-95 px-8 py-3.5 rounded-full font-semibold text-lg transition-all shadow-lg hover:shadow-xl flex items-center justify-center gap-2">
                Update Password
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
            </button>
        </form>
        
        <div class="mt-8 pt-6 border-t border-gray-100 dark:border-zinc-800 text-center">
            <a href="{% url 'users:dashboard' %}" class="text-gray-600 dark:text-gray-300 hover:text-black dark:hover:text-white transition-colors font-medium">Cancel and return to Dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
