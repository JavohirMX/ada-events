{% extends 'base.html' %}

{% block title %}Password Changed - ADA Bali Events{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-6 lg:px-8 py-16 lg:py-24">
    <div class="bg-white/80 dark:bg-zinc-900/80 backdrop-blur-xl border border-gray-200 dark:border-white/10 rounded-[32px] p-8 md:p-10 shadow-[0_8px_30px_rgb(0,0,0,0.12)] dark:shadow-[0_8px_30px_rgb(0,0,0,0.3)] text-center">
        <div class="w-16 h-16 bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        </div>
        
        <h1 class="text-3xl font-extrabold tracking-tight text-gray-900 dark:text-white mb-4">Password Changed</h1>
        <p class="text-gray-600 dark:text-gray-300 mb-8">Your password has been successfully changed.</p>
        
        <a href="{% url 'account_login' %}" class="w-full inline-block bg-black dark:bg-white text-white dark:text-black hover:scale-[1.02] active:scale-95 px-8 py-3.5 rounded-full font-semibold text-lg transition-all shadow-lg hover:shadow-xl">
            Log in with new password
        </a>
    </div>
</div>
{% endblock %}
