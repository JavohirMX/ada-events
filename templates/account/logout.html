{% extends 'base.html' %}

{% block title %}Sign Out - ADA Bali Events{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-6 lg:px-8 py-16 lg:py-24">
    <div class="bg-white/80 dark:bg-zinc-900/80 backdrop-blur-xl border border-gray-200 dark:border-white/10 rounded-[32px] p-8 md:p-10 shadow-[0_8px_30px_rgb(0,0,0,0.12)] dark:shadow-[0_8px_30px_rgb(0,0,0,0.3)] text-center">
        <h1 class="text-3xl font-extrabold tracking-tight text-gray-900 dark:text-white mb-4">Sign Out</h1>
        <p class="text-gray-600 dark:text-gray-300 mb-8">Are you sure you want to sign out?</p>
        
        <form method="post" action="{% url 'account_logout' %}">
            {% csrf_token %}
            {% if redirect_field_value %}
            <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}"/>
            {% endif %}
            <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white hover:scale-[1.02] active:scale-95 px-8 py-3.5 rounded-full font-semibold text-lg transition-all shadow-lg hover:shadow-xl flex items-center justify-center gap-2 mb-4">
                Sign Out
            </button>
            <a href="javascript:history.back()" class="w-full inline-block bg-gray-100 dark:bg-zinc-800 text-gray-900 dark:text-white hover:bg-gray-200 dark:hover:bg-zinc-700 px-8 py-3.5 rounded-full font-semibold text-lg transition-all">
                Cancel
            </a>
        </form>
    </div>
</div>
{% endblock %}
