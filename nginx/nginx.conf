user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    gzip            on;
    gzip_vary       on;
    gzip_comp_level 6;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss
                    font/woff2 image/svg+xml;

    upstream web {
        server web:8000;
        keepalive 16;           # reuse TCP connections to gunicorn
    }

    # ── HTTP ──────────────────────────────────────────────────────────────────
    # Serves the Let's Encrypt ACME challenge and redirects everything else to
    # HTTPS once a certificate is in place.
    server {
        listen 80;
        server_name _;

        # Let's Encrypt webroot challenge — needed for initial cert issuance
        # and automatic renewals.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # ── After obtaining a certificate, uncomment the block below ──────
        # Initial cert setup (run once):
        #   docker-compose --profile certbot run --rm certbot certonly \
        #     --webroot -w /var/www/certbot \
        #     --email you@example.com --agree-tos --no-eff-email \
        #     -d yourdomain.com
        # Then uncomment, set server_name in the HTTPS block, and reload:
        #   docker-compose exec nginx nginx -s reload
        #
        # location / {
        #     return 301 https://$host$request_uri;
        # }

        # ── Temporary: serve directly over HTTP until HTTPS is configured ──
        client_max_body_size 10M;

        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /media/ {
            alias /app/media/;
            expires 7d;
            add_header Cache-Control "public";
        }

        location / {
            proxy_pass            http://web;
            proxy_http_version    1.1;
            proxy_set_header      Connection "";
            proxy_set_header      Host $host;
            proxy_set_header      X-Real-IP $remote_addr;
            proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header      X-Forwarded-Proto $scheme;
            proxy_redirect        off;
            proxy_read_timeout    60s;
            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
        }
    }

    # ── HTTPS — uncomment after obtaining a Let's Encrypt certificate ─────────
    #
    # Replace YOUR_DOMAIN with your actual domain name in all three places below.
    #
    # server {
    #     listen 443 ssl;
    #     server_name YOUR_DOMAIN;
    #
    #     ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    #     ssl_prefer_server_ciphers off;
    #     ssl_session_cache   shared:SSL:10m;
    #     ssl_session_timeout 1d;
    #
    #     client_max_body_size 10M;
    #
    #     add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    #     add_header X-Content-Type-Options    "nosniff"                          always;
    #     add_header X-Frame-Options           "SAMEORIGIN"                       always;
    #     add_header Referrer-Policy           "strict-origin-when-cross-origin"  always;
    #     add_header Permissions-Policy        "geolocation=()"                   always;
    #
    #     location /static/ {
    #         alias /app/staticfiles/;
    #         expires 30d;
    #         add_header Cache-Control "public, immutable";
    #     }
    #
    #     location /media/ {
    #         alias /app/media/;
    #         expires 7d;
    #         add_header Cache-Control "public";
    #     }
    #
    #     location / {
    #         proxy_pass            http://web;
    #         proxy_http_version    1.1;
    #         proxy_set_header      Connection "";
