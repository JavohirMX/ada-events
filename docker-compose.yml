services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-ada_events}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - internal_net
    restart: unless-stopped

  web:
    build: .
    # Tag the built image so `worker` can reference it without rebuilding
    image: ada_events_web
    volumes:
      - ./media:/app/media
      - static_volume:/app/staticfiles
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_DB=${POSTGRES_DB:-ada_events}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-dev}
      - DEBUG=${DEBUG:-False}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost}
      - SECURE_SSL_REDIRECT=${SECURE_SSL_REDIRECT:-False}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-False}
      - CSRF_COOKIE_SECURE=${CSRF_COOKIE_SECURE:-False}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - internal_net
    restart: unless-stopped

  worker:
    # Re-uses the image built by the `web` service — no separate build
    image: ada_events_web
    command: python manage.py qcluster
    volumes:
      - ./media:/app/media
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_DB=${POSTGRES_DB:-ada_events}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-dev}
      - DEBUG=${DEBUG:-False}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost}
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - internal_net
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - ./media:/app/media:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    ports:
      - "8080:80"
      - "8443:443"
    depends_on:
      web:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64m
    networks:
      - internal_net
    restart: unless-stopped

  # ── Let's Encrypt ─────────────────────────────────────────────────────────
  # Only runs when explicitly invoked:
  #   Initial cert:  docker-compose --profile certbot run --rm certbot certonly \
  #                    --webroot -w /var/www/certbot -d yourdomain.com
  #   Auto-renew:    docker-compose --profile certbot up certbot
  certbot:
    image: certbot/certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    profiles:
      - certbot
    # Renewal loop: checks every 12 hours (certbot only renews if <30 days remain)
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do certbot renew; sleep 12h & wait $${!}; done"

networks:
  internal_net:
    driver: bridge

volumes:
  postgres_data:
  static_volume:
  certbot_conf:
  certbot_www:

